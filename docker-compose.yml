services:
  mysql:
    image: mysql:8.0
    container_name: hypnos_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_hypnos
      MYSQL_DATABASE: hypnos_pms
      MYSQL_USER: hypnoshotel
      MYSQL_PASSWORD: hypnos1234
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/config/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - hotel_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  phpmyadmin:
    image: phpmyadmin
    container_name: hypnos_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root_hypnos
    networks:
      - hotel_network
    depends_on:
      - mysql

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hypnos_app
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: hypnos_pms
      DB_USER: hypnoshotel
      DB_PASSWORD: hypnos1234
      JWT_SECRET: hypnos_pms_jwt
      PORT: 3001
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - hotel_network

networks:
  hotel_network:
    driver: bridge

volumes:
  mysql_data:
